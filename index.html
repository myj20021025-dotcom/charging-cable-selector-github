<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <title>充电站电缆截面选型</title>
  <style>
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 16px 10px 24px;
      background: #d4d4d4;
      font: 13px/1.35 "Segoe UI", "Microsoft YaHei", sans-serif;
      color: #222;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .window {
      width: 100%;
      max-width: 380px;
      background: #fff;
      border: 1px solid #6d6d6d;
      border-radius: 4px;
      box-shadow: 2px 3px 12px rgba(0, 0, 0, 0.22);
      overflow: hidden;
    }
    .titlebar {
      padding: 8px 10px;
      background: linear-gradient(180deg, #f5f5f5 0%, #e8e8e8 100%);
      border-bottom: 1px solid #b0b0b0;
      font-size: 13px;
      font-weight: 600;
      cursor: default;
      user-select: none;
    }
    .display {
      margin: 10px;
      padding: 8px 10px;
      background: #f0f0f0;
      border: 1px solid #a0a0a0;
      border-radius: 2px;
      min-height: 56px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
    }
    .display dl { margin: 0; }
    .display dt { color: #444; font-size: 11px; margin-top: 6px; }
    .display dt:first-child { margin-top: 0; }
    .display dd { margin: 2px 0 0; font-size: 15px; font-weight: 700; }
    .display .warn { font-size: 11px; font-weight: 400; color: #c00000; }
    .panel { padding: 0 10px 10px; }
    .field {
      display: grid;
      grid-template-columns: 102px 1fr;
      gap: 6px 8px;
      align-items: center;
      margin-bottom: 6px;
    }
    .field label {
      font-size: 11px;
      color: #333;
      line-height: 1.2;
    }
    .field.hidden { display: none; }
    input, select {
      width: 100%;
      padding: 3px 5px;
      font: 12px inherit;
      border: 1px solid #7a7a7a;
      border-radius: 2px;
      background: #fff;
      color: #000;
      height: 24px;
    }
    select { padding: 2px 2px; }
    input:focus, select:focus {
      outline: 1px solid #0078d7;
      outline-offset: 0;
    }
    @media (max-width: 480px) {
      body { padding: 10px 8px 20px; }
      input, select {
        font-size: 16px;
        min-height: 40px;
        height: auto;
      }
      .field { grid-template-columns: 92px 1fr; }
    }
    details {
      margin: 8px 10px 10px;
      border: 1px solid #c0c0c0;
      border-radius: 2px;
      background: #fafafa;
      font-size: 11px;
    }
    details summary {
      padding: 5px 8px;
      cursor: pointer;
      background: #eee;
      border-bottom: 1px solid #c0c0c0;
      user-select: none;
    }
    details[open] summary { border-bottom: 1px solid #c0c0c0; }
    .steps-pre {
      margin: 0;
      padding: 8px;
      white-space: pre-wrap;
      word-break: break-word;
      font: 11px/1.45 Consolas, "Courier New", monospace;
      color: #222;
      max-height: 240px;
      overflow: auto;
    }
    .foot {
      margin: 0 10px 10px;
      font-size: 10px;
      color: #555;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">充电站电缆截面 · GB 50217-2018 附录 C / D</div>
    <div id="summary" class="display" aria-live="polite"></div>
    <div class="panel">
      <div class="field">
        <label for="p">功率 P (kW)</label>
        <input id="p" type="number" min="1" step="0.1" value="120" />
      </div>
      <div class="field">
        <label for="u">电压</label>
        <select id="u">
          <option value="380" selected>三相 380 V</option>
          <option value="240">单相 240 V</option>
        </select>
      </div>
      <div class="field">
        <label for="pf">cos φ</label>
        <input id="pf" type="number" min="0.1" max="1" step="0.01" value="0.98" />
      </div>
      <div class="field">
        <label for="len">长度 L (m)</label>
        <input id="len" type="number" min="1" step="1" value="80" />
      </div>
      <div class="field">
        <label for="du">ΔU 限值 (%)</label>
        <input id="du" type="number" min="0.1" max="20" step="0.1" value="5" />
      </div>
      <div class="field">
        <label for="cableTable">电缆·表号</label>
        <select id="cableTable">
          <option value="c011">PVC 1kV · 表 C.0.1-1 空气中</option>
          <option value="c012">PVC 1kV · 表 C.0.1-2 直埋 (ρ=1.2)</option>
          <option value="c013" selected>XLPE 1~3kV · 表 C.0.1-3 空气中</option>
          <option value="c014">XLPE 1~3kV · 表 C.0.1-4 直埋 (ρ=2.0)</option>
          <option value="c02">XLPE 6kV · 表 C.0.2</option>
          <option value="c03">XLPE 10kV · 表 C.0.3</option>
        </select>
      </div>
      <div class="field" id="rowPvc">
        <label for="pvcCore">PVC 芯数</label>
        <select id="pvcCore">
          <option value="2">2 芯</option>
          <option value="34" selected>3 或 4 芯</option>
        </select>
      </div>
      <div class="field hidden" id="rowArmor">
        <label for="pvcArmor">PVC 直埋</label>
        <select id="pvcArmor">
          <option value="no" selected>无钢铠</option>
          <option value="yes">有钢铠</option>
        </select>
      </div>
      <div class="field hidden" id="rowXlpe">
        <label for="xlpeLay">XLPE 排列</label>
        <select id="xlpeLay">
          <option value="3c" selected>3 芯</option>
          <option value="tss">单芯 品字形·接地 单侧</option>
          <option value="tbs">单芯 品字形·接地 两侧</option>
          <option value="hss">单芯 水平·单侧</option>
          <option value="hbs">单芯 水平·两侧</option>
        </select>
      </div>
      <div class="field hidden" id="rowHV">
        <label for="hvLay">6/10kV 栏</label>
        <select id="hvLay">
          <option value="na" selected>无铠·空气中</option>
          <option value="nb">无铠·直埋</option>
          <option value="aa">有铠·空气中</option>
          <option value="ab">有铠·直埋</option>
        </select>
      </div>
      <div class="field">
        <label for="tamb">环境 (℃)</label>
        <input id="tamb" type="number" step="1" value="40" />
      </div>
      <div class="field hidden" id="rowSoil">
        <label for="soil">土壤 ρ</label>
        <select id="soil">
          <option value="0.8">0.8</option>
          <option value="1.2" id="soilOpt12">1.2 (C.0.1-2 基准)</option>
          <option value="1.5">1.5</option>
          <option value="2.0" id="soilOpt20" selected>2.0 (C.0.1-4 基准)</option>
          <option value="3.0">3.0</option>
        </select>
      </div>
      <div class="field hidden" id="rowBurPar">
        <label for="burDist">直埋净距 mm</label>
        <select id="burDist">
          <option value="100" selected>100（表 D.0.4）</option>
          <option value="200">200</option>
          <option value="300">300</option>
        </select>
      </div>
      <div class="field hidden" id="rowBurCount">
        <label for="burParallel">直埋并列回路</label>
        <select id="burParallel">
          <option value="1" selected>1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
        </select>
      </div>
      <div class="field hidden" id="rowAirPar">
        <label for="parallel">空气并列根数</label>
        <select id="parallel">
          <option value="1" selected>1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
        </select>
      </div>
      <div class="field hidden" id="rowSpacing">
        <label for="spacing">间距 S/d</label>
        <select id="spacing">
          <option value="1d">1</option>
          <option value="2d" selected>2</option>
          <option value="3d">3</option>
        </select>
      </div>
      <div class="field" id="rowBridge">
        <label for="bridge">桥架多层 D.0.6</label>
        <select id="bridge">
          <option value="0" selected>不用</option>
          <option value="l1">梯架·1 层 0.80</option>
          <option value="l2">梯架·2 层 0.65</option>
          <option value="l3">梯架·3 层 0.55</option>
          <option value="l4">梯架·4 层 0.50</option>
          <option value="t1">托盘·1 层 0.70</option>
          <option value="t2">托盘·2 层 0.55</option>
          <option value="t3">托盘·3 层 0.50</option>
          <option value="t4">托盘·4 层 0.45</option>
        </select>
      </div>
      <div class="field" id="rowOutdoor">
        <label for="outdoor">户外无遮阳 D.0.7</label>
        <select id="outdoor">
          <option value="0" selected>否</option>
          <option value="1">是（1kV/6kV 按截面查表）</option>
        </select>
      </div>
    </div>
    <details>
      <summary>计算过程</summary>
      <pre id="steps" class="steps-pre"></pre>
    </details>
    <p class="foot">附录 C 各表值为<strong>铝芯</strong>载流量；<strong>铜芯 = 铝芯 × 1.29</strong>（规范各表注 1）。C.0.1-3 中 3 芯 400mm² 及以上表中未列，程序按同表<strong>单芯品字形单侧</strong>铝值延续。电压降、谐波与短路未计。</p>
  </div>
  <script>
(function () {
  "use strict";

  const CU_MULT = 1.29;

  /** 表 C.0.1-1 铝 空气中 40℃ 70℃ */
  const C011_SEC2 = [2.5, 4, 6, 10, 16, 25, 35, 50, 70, 95, 120, 150];
  const C011_AL2 = [18, 24, 31, 44, 60, 79, 95, 121, 147, 181, 211, 242];
  const C011_SEC34 = [2.5, 4, 6, 10, 16, 25, 35, 50, 70, 95, 120, 150, 185, 240, 300];
  const C011_AL34 = [15, 21, 27, 38, 52, 69, 82, 104, 129, 155, 181, 211, 246, 294, 328];

  /** 表 C.0.1-2 铝 直埋 25℃ ρ=1.2 */
  const C012_SEC = [4, 6, 10, 16, 25, 35, 50, 70, 95, 120, 150, 185, 240, 300];
  const C012_SEC2 = [4, 6, 10, 16, 25, 35, 50, 70, 95, 120, 150];
  const C012_2_NO = [36, 45, 62, 83, 105, 136, 157, 184, 226, 254, 287];
  const C012_2_YES = [34, 43, 59, 79, 100, 131, 152, 180, 217, 249, 273];
  const C012_34_NO = [31, 38, 53, 70, 90, 110, 134, 157, 189, 212, 242, 273, 319, 347];
  const C012_34_YES = [30, 37, 50, 68, 87, 105, 129, 152, 180, 207, 237, 264, 310, 347];

  /** 表 C.0.1-3 铝 空气 40℃ 90℃ — 400+ 3 芯按品字形单侧补全 */
  const C013_SEC = [25, 35, 50, 70, 95, 120, 150, 185, 240, 300, 400, 500, 630];
  const C013_3C = [91, 114, 146, 178, 214, 246, 278, 319, 378, 419, 611, 712, 826];
  const C013_TSS = [100, 127, 155, 196, 241, 283, 328, 372, 442, 506, 611, 712, 826];
  const C013_TBS = [100, 127, 155, 196, 241, 278, 319, 365, 424, 493, 579, 661, 734];
  const C013_HSS = [114, 146, 173, 228, 278, 319, 365, 424, 502, 588, 707, 830, 963];
  const C013_HBS = [114, 141, 168, 214, 260, 292, 337, 369, 424, 479, 546, 611, 680];

  /** 表 C.0.1-4 铝 直埋 25℃ ρ=2.0 — 3 芯 400+ 用品字形单侧 */
  const C014_3C = [91, 113, 134, 165, 195, 221, 247, 278, 321, 365, 456, 517, 582];
  const C014_TSS = [104, 117, 139, 174, 208, 239, 269, 300, 348, 391, 456, 517, 582];
  const C014_HSS = [113, 134, 160, 195, 230, 261, 295, 330, 378, 430, 500, 565, 635];

  /** 表 C.0.2 铝 6kV 3 芯 */
  const C02_SEC = [25, 35, 50, 70, 95, 120, 150, 185, 240, 300, 400, 500];
  const C02_NA = [null, 114, 141, 173, 209, 246, 277, 323, 378, 432, 505, 584];
  const C02_NB = [87, 105, 123, 148, 178, 200, 232, 262, 300, 343, 380, 432];
  const C02_AA = [null, null, null, null, null, null, null, null, null, null, null, null];
  const C02_AB = [87, 102, 118, 148, 178, 200, 222, 252, 295, 333, 370, 422];

  /** 表 C.0.3 铝 10kV 3 芯 */
  const C03_SEC = [25, 35, 50, 70, 95, 120, 150, 185, 240, 300, 400, 500];
  const C03_NA = [100, 123, 146, 178, 219, 251, 283, 324, 378, 433, 506, 579];
  const C03_NB = [90, 110, 125, 152, 182, 205, 223, 252, 292, 332, 378, 428];
  const C03_AA = [100, 123, 141, 173, 214, 246, 278, 320, 373, 428, 501, 574];
  const C03_AB = [90, 105, 120, 152, 182, 205, 219, 247, 292, 328, 374, 424];

    /** D.0.1 空气中 */
  const TK_AIR_70 = { 30: 1.15, 35: 1.08, 40: 1.0, 45: 0.91 };
  const TK_AIR_90 = { 30: 1.09, 35: 1.05, 40: 1.0, 45: 0.94 };
  const TK_SOIL_70 = { 20: 1.05, 25: 1.0, 30: 0.94, 35: 0.88 };
  const TK_SOIL_90 = { 20: 1.04, 25: 1.0, 30: 0.96, 35: 0.92 };

  const SOIL_K = { 0.8: 1.05, 1.2: 1.0, 1.5: 0.93, 2.0: 0.87, 3.0: 0.75 };

  const PARALLEL_K = {
    "1d": { 2: 1.0, 3: 0.9, 4: 0.85, 5: 0.82, 6: 0.81 },
    "2d": { 2: 1.0, 3: 1.0, 4: 0.98, 5: 0.95, 6: 0.93 },
    "3d": { 2: 1.0, 3: 1.0, 4: 1.0, 5: 0.98, 6: 0.97 },
  };

  const BURIED_GROUP_K = {
    100: { 1: 1, 2: 0.9, 3: 0.85, 4: 0.8, 5: 0.78, 6: 0.75 },
    200: { 1: 1, 2: 0.92, 3: 0.87, 4: 0.84, 5: 0.82, 6: 0.81 },
    300: { 1: 1, 2: 0.93, 3: 0.9, 4: 0.87, 5: 0.86, 6: 0.85 },
  };

  /** D.0.7 户外无遮阳，以室内空气中为基准 — 1kV 三芯 */
  function kD07_1kv3(mm2) {
    const m = {
      95: 0.9, 120: 0.98, 150: 0.97, 185: 0.96, 240: 0.94,
    };
    return m[mm2] != null ? m[mm2] : 1.0;
  }
  /** 6kV 三芯 */
  function kD07_6kv3(mm2) {
    const m = {
      35: 0.96, 50: 0.95, 70: 0.94, 95: 0.93, 120: 0.92, 150: 0.91, 185: 0.9, 240: 0.88,
    };
    return m[mm2] != null ? m[mm2] : 1.0;
  }

  const R_CU_MOHM_M = {
    2.5: 68, 4: 42.5, 6: 28.3, 10: 17.0, 16: 10.6,
    25: 9.45, 35: 6.75, 50: 4.95, 70: 3.45, 95: 2.52, 120: 2.01,
    150: 1.62, 185: 1.29, 240: 1.0, 300: 0.82, 400: 0.63, 500: 0.51, 630: 0.41,
  };
  const X_MOHM_M = {
    2.5: 0.11, 4: 0.105, 6: 0.1, 10: 0.1, 16: 0.095,
    25: 0.1, 35: 0.095, 50: 0.09, 70: 0.085, 95: 0.08, 120: 0.08,
    150: 0.075, 185: 0.075, 240: 0.07, 300: 0.069, 400: 0.067, 500: 0.065, 630: 0.063,
  };

  function interpTempK(table, t) {
    const keys = Object.keys(table).map(Number).sort((a, b) => a - b);
    if (table[t] != null) return table[t];
    if (t <= keys[0]) return table[keys[0]];
    if (t >= keys[keys.length - 1]) return table[keys[keys.length - 1]];
    let i = 0;
    while (i < keys.length - 1 && keys[i + 1] < t) i++;
    const t0 = keys[i], t1 = keys[i + 1];
    return table[t0] + ((table[t1] - table[t0]) * (t - t0)) / (t1 - t0);
  }

  function soilFactorRelative(userRho, baseRho) {
    const ku = SOIL_K[userRho];
    const k0 = SOIL_K[baseRho];
    if (ku == null || k0 == null) return 1;
    return ku / k0;
  }

  function parallelAirFactor(n, spacingKey) {
    if (n === 1) return 1;
    const row = PARALLEL_K[spacingKey] || PARALLEL_K["2d"];
    return row[n] != null ? row[n] : row[6];
  }

  function buriedGroupFactor(distMm, n) {
    const row = BURIED_GROUP_K[distMm] || BURIED_GROUP_K[100];
    return row[n] != null ? row[n] : row[6];
  }

  function bridgeFactor(code) {
    const map = {
      l1: 0.8, l2: 0.65, l3: 0.55, l4: 0.5,
      t1: 0.7, t2: 0.55, t3: 0.5, t4: 0.45,
    };
    return map[code] != null ? map[code] : 1;
  }

  /** 根据选项返回 { sections, al, name, thetaM, refSoilT, soilBase, isBuried, isAir, tableId } */
  function getProfile() {
    const t = document.getElementById("cableTable").value;
    const pvcCore = document.getElementById("pvcCore").value;
    const armor = document.getElementById("pvcArmor").value === "yes";
    const xl = document.getElementById("xlpeLay").value;
    const hv = document.getElementById("hvLay").value;

    if (t === "c011") {
      const two = pvcCore === "2";
      return {
        sections: two ? C011_SEC2 : C011_SEC34,
        al: two ? C011_AL2 : C011_AL34,
        name: "表 C.0.1-1（PVC，空气，" + (two ? "2 芯" : "3 或 4 芯") + "）",
        thetaM: 70,
        refSoilT: null,
        soilBase: null,
        isBuried: false,
        isAir: true,
        tableId: "c011",
      };
    }
    if (t === "c012") {
      const two = pvcCore === "2";
      let sec, al;
      if (two) {
        sec = C012_SEC2;
        al = armor ? C012_2_YES : C012_2_NO;
      } else {
        sec = C012_SEC;
        al = armor ? C012_34_YES : C012_34_NO;
      }
      return {
        sections: sec,
        al: al,
        name: "表 C.0.1-2（PVC，直埋 ρ=1.2，" + (armor ? "有铠" : "无铠") + "，" + (two ? "2 芯" : "3 或 4 芯") + "）",
        thetaM: 70,
        refSoilT: 25,
        soilBase: 1.2,
        isBuried: true,
        isAir: false,
        tableId: "c012",
      };
    }
    if (t === "c013") {
      let al;
      let note = "";
      if (xl === "3c") al = C013_3C;
      else if (xl === "tss") al = C013_TSS;
      else if (xl === "tbs") al = C013_TBS;
      else if (xl === "hss") al = C013_HSS;
      else al = C013_HBS;
      return {
        sections: C013_SEC,
        al: al,
        name: "表 C.0.1-3（XLPE 空气，" + xl + "）" + note,
        thetaM: 90,
        refSoilT: null,
        soilBase: null,
        isBuried: false,
        isAir: true,
        tableId: "c013",
      };
    }
    if (t === "c014") {
      let al;
      if (xl === "3c") al = C014_3C;
      else if (xl === "tss" || xl === "tbs") al = C014_TSS;
      else al = C014_HSS;
      return {
        sections: C013_SEC,
        al: al,
        name: "表 C.0.1-4（XLPE 直埋 ρ=2.0，" + xl + "）",
        thetaM: 90,
        refSoilT: 25,
        soilBase: 2.0,
        isBuried: true,
        isAir: false,
        tableId: "c014",
      };
    }
    if (t === "c02") {
      const al = hv === "na" ? C02_NA : hv === "nb" ? C02_NB : hv === "aa" ? C02_AA : C02_AB;
      const buried = hv === "nb" || hv === "ab";
      return {
        sections: C02_SEC,
        al: al,
        name: "表 C.0.2（6kV，" + hv + "）",
        thetaM: 90,
        refSoilT: buried ? 25 : null,
        soilBase: buried ? 2.0 : null,
        isBuried: buried,
        isAir: !buried,
        tableId: "c02",
      };
    }
    const al = hv === "na" ? C03_NA : hv === "nb" ? C03_NB : hv === "aa" ? C03_AA : C03_AB;
    const buried = hv === "nb" || hv === "ab";
    return {
      sections: C03_SEC,
      al: al,
      name: "表 C.0.3（10kV，" + hv + "）",
      thetaM: 90,
      refSoilT: buried ? 25 : null,
      soilBase: buried ? 2.0 : null,
      isBuried: buried,
      isAir: !buried,
      tableId: "c03",
    };
  }

  /** kProdFn(i) 可对每档截面变化（如 D.0.7）；铜芯允许电流 = 铝芯表值×K总×1.29 */
  function minSectionMaterial(Ireq, sections, alArr, kProdFn, forCopper) {
    for (let i = 0; i < sections.length; i++) {
      const b = alArr[i];
      if (b == null || b <= 0) continue;
      const kp = kProdFn(i);
      const Ial = b * kp;
      const Icu = b * kp * CU_MULT;
      if (forCopper) {
        if (Icu >= Ireq) return { mm2: sections[i], IallowAl: Ial, IallowCu: Icu, idx: i, sections, alArr };
      } else {
        if (Ial >= Ireq) return { mm2: sections[i], IallowAl: Ial, IallowCu: Icu, idx: i, sections, alArr };
      }
    }
    let lastIdx = -1;
    for (let j = sections.length - 1; j >= 0; j--) {
      if (alArr[j] != null && alArr[j] > 0) { lastIdx = j; break; }
    }
    if (lastIdx < 0) return { mm2: null, IallowAl: 0, IallowCu: 0, idx: 0, sections, alArr };
    const kp0 = kProdFn(lastIdx);
    const b0 = alArr[lastIdx];
    return {
      mm2: null,
      IallowAl: b0 * kp0,
      IallowCu: b0 * kp0 * CU_MULT,
      idx: lastIdx,
      sections,
      alArr,
    };
  }

  function voltageDropPercent(material, mm2, I, L_m, U_V, threePhase, cosFi) {
    const rCu = (R_CU_MOHM_M[mm2] != null ? R_CU_MOHM_M[mm2] : 9.45) / 1000;
    const x = (X_MOHM_M[mm2] != null ? X_MOHM_M[mm2] : 0.08) / 1000;
    const r = material === "Cu" ? rCu : rCu * 1.61;
    const sinFi = Math.sqrt(Math.max(0, 1 - cosFi * cosFi));
    const L = L_m / 1000;
    if (threePhase) {
      return (Math.sqrt(3) * I * L * (r * cosFi + x * sinFi) / U_V) * 100;
    }
    return (2 * I * L * (r * cosFi + x * sinFi) / U_V) * 100;
  }

  function fmt(x, d) {
    if (x == null || Number.isNaN(x)) return "—";
    return Number(x).toFixed(d != null ? d : 3);
  }

  function syncUI() {
    const t = document.getElementById("cableTable").value;
    const showPvc = t === "c011" || t === "c012";
    const showArm = t === "c012";
    const showXl = t === "c013" || t === "c014";
    const showHv = t === "c02" || t === "c03";
    document.getElementById("rowPvc").classList.toggle("hidden", !showPvc);
    document.getElementById("rowArmor").classList.toggle("hidden", !showArm);
    document.getElementById("rowXlpe").classList.toggle("hidden", !showXl);
    document.getElementById("rowHV").classList.toggle("hidden", !showHv);

    const prof = getProfile();
    const soil = document.getElementById("rowSoil");
    soil.classList.toggle("hidden", prof.soilBase == null);
    document.getElementById("rowBurPar").classList.toggle("hidden", !prof.isBuried);
    document.getElementById("rowBurCount").classList.toggle("hidden", !prof.isBuried);
    document.getElementById("rowAirPar").classList.toggle("hidden", !prof.isAir);
    document.getElementById("rowSpacing").classList.toggle("hidden", !prof.isAir || parseInt(document.getElementById("parallel").value, 10) <= 1);

    const outdoorRow = document.getElementById("rowOutdoor");
    const osel = document.getElementById("outdoor");
    if (t === "c03") {
      outdoorRow.classList.add("hidden");
      osel.value = "0";
    } else {
      outdoorRow.classList.remove("hidden");
    }
  }

  function compute() {
    syncUI();
    const prof = getProfile();
    const PkW = parseFloat(document.getElementById("p").value) || 0;
    const Usel = document.getElementById("u").value;
    const U = Usel === "380" ? 380 : 240;
    const three = Usel === "380";
    const cosFi = parseFloat(document.getElementById("pf").value) || 0.98;
    const Lm = parseFloat(document.getElementById("len").value) || 1;
    const duMax = parseFloat(document.getElementById("du").value) || 5;
    let tamb = parseFloat(document.getElementById("tamb").value) || 40;
    const soilRho = parseFloat(document.getElementById("soil").value);
    const nPar = parseInt(document.getElementById("parallel").value, 10) || 1;
    const sp = document.getElementById("spacing").value;
    const burN = parseInt(document.getElementById("burParallel").value, 10) || 1;
    const burDist = parseInt(document.getElementById("burDist").value, 10) || 100;
    const bridgeCode = document.getElementById("bridge").value;
    const useOutdoor = document.getElementById("outdoor").value === "1";
    const cableTab = document.getElementById("cableTable").value;

    if (prof.isBuried && prof.refSoilT != null) {
      if (document.getElementById("tamb").value === "" || (prof.tableId === "c012" && tamb === 40)) {
        document.getElementById("tamb").value = "25";
        tamb = 25;
      }
    }

    const P = PkW * 1000;
    const I = three ? P / (Math.sqrt(3) * U * cosFi) : P / (U * cosFi);

    let kTemp;
    if (prof.isBuried && prof.refSoilT != null) {
      kTemp = prof.thetaM === 70
        ? interpTempK(TK_SOIL_70, tamb)
        : interpTempK(TK_SOIL_90, tamb);
    } else {
      kTemp = prof.thetaM === 70
        ? interpTempK(TK_AIR_70, tamb)
        : interpTempK(TK_AIR_90, tamb);
    }

    let kSoil = 1;
    if (prof.soilBase != null) kSoil = soilFactorRelative(soilRho, prof.soilBase);

    let kAirPar = 1;
    if (prof.isAir) kAirPar = parallelAirFactor(nPar, sp);

    let kBurGroup = 1;
    if (prof.isBuried && burN > 1) kBurGroup = buriedGroupFactor(burDist, burN);

    const kBrid = bridgeFactor(bridgeCode);
    const kCore = kTemp * kSoil * kAirPar * kBurGroup * kBrid;

    const sections = prof.sections;
    const alArr = prof.al;

    function kProdFn(i) {
      let kp = kCore;
      if (useOutdoor && prof.isAir) {
        if (cableTab === "c011" || cableTab === "c013") kp *= kD07_1kv3(sections[i]);
        else if (cableTab === "c02") kp *= kD07_6kv3(sections[i]);
      }
      return kp;
    }

    const rAl = minSectionMaterial(I, sections, alArr, kProdFn, false);
    const rCu = minSectionMaterial(I, sections, alArr, kProdFn, true);

    let lines = [];
    lines.push("【1】工作电流 I = " + fmt(I, 2) + " A");
    lines.push("");
    lines.push("【2】校正系数（附录 D）");
    lines.push("θm=" + prof.thetaM + "℃：" + (prof.isBuried ? "土壤" : "空气") + " Kθ = " + fmt(kTemp, 4));
    if (prof.soilBase != null) {
      lines.push("Kρ（相对表基准 ρ=" + prof.soilBase + "）= " + fmt(kSoil, 4));
    }
    if (prof.isAir && nPar > 1) lines.push("空气并列 D.0.5：K并 = " + fmt(kAirPar, 4));
    if (prof.isBuried && burN > 1) lines.push("直埋并列 D.0.4（净距 " + burDist + "mm）：K并埋 = " + fmt(kBurGroup, 4));
    if (kBrid < 1) lines.push("桥架多层 D.0.6：K桥 = " + fmt(kBrid, 4));
    if (useOutdoor && prof.isAir && (cableTab === "c011" || cableTab === "c013" || cableTab === "c02")) {
      lines.push("户外无遮阳 D.0.7：按截面逐档乘 K日（1kV/6kV 表），已计入选截面");
    }
    lines.push("K总（不含日射，日射已进逐档）：" + fmt(kTemp * kSoil * kAirPar * kBurGroup * kBrid, 4));
    lines.push("");
    lines.push("【3】载流量：附录 " + prof.name);
    lines.push("铝芯表值 × K；铜芯 = 铝 × " + CU_MULT + "（规范表注 1）");
    lines.push("铝≥ " + (rAl.mm2 != null ? rAl.mm2 + " mm²（允许 " + fmt(rAl.IallowAl, 1) + " A）" : "超出表"));
    lines.push("铜≥ " + (rCu.mm2 != null ? rCu.mm2 + " mm²（允许 " + fmt(rCu.IallowCu, 1) + " A）" : "超出表"));
    lines.push("");
    lines.push("【4】电压降校验");

    function bumpVd(mat, startIdx, secArr, alA) {
      for (let idx = Math.max(0, startIdx); idx < secArr.length; idx++) {
        if (alA[idx] == null || alA[idx] <= 0) continue;
        const mm2 = secArr[idx];
        const pct = voltageDropPercent(mat, mm2, I, Lm, U, three, cosFi);
        if (pct <= duMax) return { mm2, pct, idx };
      }
      let j = secArr.length - 1;
      while (j > 0 && (alA[j] == null || alA[j] <= 0)) j--;
      return { mm2: secArr[j], pct: voltageDropPercent(mat, secArr[j], I, Lm, U, three, cosFi), idx: j };
    }

    function finalize(r, forCopper) {
      if (r.mm2 == null) return { mm2: null, pct: null, Iallow: null };
      let idx = r.idx;
      let mm2 = r.mm2;
      let pct = voltageDropPercent(forCopper ? "Cu" : "Al", mm2, I, Lm, U, three, cosFi);
      if (pct > duMax) {
        const b = bumpVd(forCopper ? "Cu" : "Al", idx, sections, alArr);
        mm2 = b.mm2;
        pct = b.pct;
        idx = b.idx;
      }
      const kp = kProdFn(idx);
      const Iallow = forCopper ? alArr[idx] * kp * CU_MULT : alArr[idx] * kp;
      return { mm2, pct, Iallow };
    }

    const finAl = finalize(rAl, false);
    const finCu = finalize(rCu, true);

    lines.push("铝 " + (rAl.mm2 != null ? rAl.mm2 : "—") + " mm²：ΔU≈" + (rAl.mm2 != null ? fmt(voltageDropPercent("Al", rAl.mm2, I, Lm, U, three, cosFi), 2) : "—") + "%");
    lines.push("铜 " + (rCu.mm2 != null ? rCu.mm2 : "—") + " mm²：ΔU≈" + (rCu.mm2 != null ? fmt(voltageDropPercent("Cu", rCu.mm2, I, Lm, U, three, cosFi), 2) : "—") + "%");

    document.getElementById("steps").textContent = lines.join("\n");

    const sum = document.getElementById("summary");
    function row(label, fin) {
      if (!fin.mm2) return `<dt>${label}</dt><dd class="warn">超出表格或无铠空气数据</dd>`;
      const okVd = fin.pct != null && fin.pct <= duMax;
      const okI = fin.Iallow != null && fin.Iallow >= I - 1e-6;
      const ok = okVd && okI;
      return `<dt>${label}${ok ? "" : "（注意）"}</dt><dd>${fin.mm2} mm²　I≈${fmt(fin.Iallow, 1)} A　ΔU≈${fmt(fin.pct, 2)}%</dd>`;
    }
    sum.innerHTML = "<dl>" + row("铜芯", finCu) + row("铝芯", finAl) + "</dl>";
  }

  const ids = ["p", "u", "pf", "len", "du", "cableTable", "pvcCore", "pvcArmor", "xlpeLay", "hvLay", "tamb", "soil", "burDist", "burParallel", "parallel", "spacing", "bridge", "outdoor"];
  ids.forEach(function (id) {
    const el = document.getElementById(id);
    if (el) {
      el.addEventListener("input", compute);
      el.addEventListener("change", compute);
    }
  });
  compute();
})();
  </script>
</body>
</html>
